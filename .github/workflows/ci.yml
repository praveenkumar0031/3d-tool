name: CI Build and Push to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    name: Build and Push Docker Image
    steps:
      - name: Checkout Application Code
        uses: actions/checkout@v4

      # 🚀 Step 2: Log in to Docker Hub using Access Tokens
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🚀 Step 3: Build and Push directly to Docker Hub Registry
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/3d-tool:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/3d-tool:latest